<!DOCTYPE html>
<html>
<head>
    <title>Processing - DiamondVision</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="phone">

    <div class="brand">
        <span>💎</span>
        DiamondVision
    </div>

    <div class="small-label">
        Your photos are being processed in the cloud.
    </div>

    <div class="processing-card">

        <h1 id="percent">0%</h1>

        <div class="progress-shell">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <p id="message">Starting...</p>

        <div class="progress-meta">
            <span id="done">0</span>
            /
            <span id="total">0</span>
            photos
        </div>

        <div class="processing-note">
            Keep this page open. DiamondVision will open your results automatically when processing is complete.
        </div>

        <a id="results-button" class="hero-button hidden" href="/tournament/{{ job_name }}">
            VIEW RESULTS
        </a>

    </div>

</div>

<script>
function updateStatus(){
    fetch("/api/status/{{ job_name }}")
        .then(response => response.json())
        .then(data => {
            const percent = data.percent || 0;

            document.getElementById("percent").innerText = percent + "%";
            document.getElementById("progress-bar").style.width = percent + "%";
            document.getElementById("message").innerText = data.message || "Processing...";
            document.getElementById("done").innerText = data.done || 0;
            document.getElementById("total").innerText = data.total || 0;

            if(data.error){
                document.getElementById("message").innerText = "Error: " + data.error;
                document.getElementById("results-button").classList.remove("hidden");
                return;
            }

            if(data.complete){
                document.getElementById("message").innerText = "Complete — opening results...";
                document.getElementById("results-button").classList.remove("hidden");
                setTimeout(function(){
                    window.location.href = document.getElementById("results-button").href;
                }, 1500);
                return;
            }

            setTimeout(updateStatus, 1500);
        })
        .catch(() => {
            document.getElementById("message").innerText = "Waiting for server...";
            setTimeout(updateStatus, 2000);
        });
}

updateStatus();
</script>

</body>
</html>
